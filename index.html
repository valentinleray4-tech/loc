<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loc'APEL école St Anne-Casson</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("nOykns8pFjxSLoS1s"); })();</script>
</head>
<body class="bg-gray-100">

    <header class="bg-indigo-700 text-white shadow-md p-6">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold text-center">Loc'APEL école St Anne-Casson</h1>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 grid lg:grid-cols-3 gap-8">
        <!-- Catalogue -->
        <div class="lg:col-span-2">
            <div class="bg-white p-6 rounded-xl shadow-sm min-h-[400px]">
                <h2 class="text-xl font-bold mb-6 border-b pb-2 text-gray-800 italic">Matériel disponible</h2>
                <div class="grid md:grid-cols-2 gap-6" id="inventory"></div>
            </div>
        </div>

        <!-- Panier -->
        <aside>
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-indigo-500 sticky top-6">
                <h2 class="text-xl font-bold mb-4 text-indigo-600"><i class="fas fa-shopping-cart mr-2"></i>Votre Panier</h2>
                <div id="panierList" class="space-y-3 mb-6 border-b pb-4 text-sm text-gray-700 italic">Vide</div>
                
                <div class="bg-indigo-50 p-3 rounded-lg text-sm mb-6">
                    <div class="flex justify-between font-bold text-gray-700"><span>Total Location :</span> <span id="totalPrix">0.00 €</span></div>
                    <div class="flex justify-between text-orange-700 font-bold"><span>Caution :</span> <span id="totalCaution">0.00 €</span></div>
                </div>

                <div class="space-y-3 p-4 bg-gray-50 rounded-lg border">
                    <input type="text" id="nom_loueur" placeholder="Nom et Prénom" class="w-full p-2 border rounded text-sm">
                    <input type="email" id="email_loueur" placeholder="Email" class="w-full p-2 border rounded text-sm">
                    <input type="tel" id="tel_loueur" placeholder="Téléphone" class="w-full p-2 border rounded text-sm">
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <input type="date" id="date_debut" class="w-full p-2 border rounded text-sm">
                        <input type="date" id="date_fin" class="w-full p-2 border rounded text-sm">
                    </div>
                </div>

                <button onclick="confirmerReservation()" id="btnSubmit" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition shadow-lg">
                    Confirmer la réservation
                </button>
            </div>
        </aside>
    </main>

    <!-- ZONE D'APERCU DU CONTRAT -->
    <div class="container mx-auto my-10 p-5 bg-white border max-w-4xl overflow-x-auto shadow-inner">
        <h3 class="text-center text-gray-400 text-xs mb-4">Aperçu du contrat envoyé par mail</h3>
        <div id="pdf-render-zone" style="width: 700px; margin: 0 auto; background: white; color: black; font-family: Arial, sans-serif; padding: 40px; border: 1px solid #eee;">
             <!-- Rempli par JS -->
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://uofkzlgqryxhjaovidqf.supabase.co', 'sb_publishable_3yWGD_MoqP-6jHeHbbIM5w_kphGAJ2F');

        let panier = [];
        let itemsData = [];

        async function fetchMateriels() {
            const { data } = await supabase.from('materiels').select('*');
            itemsData = data || [];
            renderInventory();
            majContratVisuel();
        }

        function renderInventory() {
            document.getElementById('inventory').innerHTML = itemsData.map(item => {
                const qteDansPanier = panier.find(p => p.id === item.id)?.qty || 0;
                const stockDisponible = (item.stock || 0) - qteDansPanier;
                const isOut = stockDisponible <= 0;

                return `
                <div class="border rounded-xl bg-white shadow-sm overflow-hidden flex flex-col ${isOut ? 'opacity-60' : ''}">
                    <img src="${item.image_url}" class="h-40 w-full object-cover bg-gray-100">
                    <div class="p-4 flex flex-col flex-grow">
                        <div class="flex justify-between font-bold text-gray-800">
                            <span>${item.nom}</span>
                            <span class="text-indigo-600">${item.prix}€</span>
                        </div>
                        <p class="text-xs ${isOut ? 'text-red-500 font-bold' : 'text-gray-500'} mt-1">Stock : ${isOut ? 'Épuisé' : stockDisponible}</p>
                        <div class="flex gap-2 mt-4">
                            <input type="number" id="qty-${item.id}" value="1" min="1" max="${stockDisponible}" class="w-12 border rounded text-center font-bold" ${isOut ? 'disabled' : ''}>
                            <button onclick="ajouterAuPanier(${item.id})" class="flex-1 ${isOut ? 'bg-gray-400' : 'bg-indigo-600 hover:bg-indigo-700'} text-white py-2 rounded-lg font-bold text-sm transition" ${isOut ? 'disabled' : ''}>
                                ${isOut ? 'Indisponible' : 'Ajouter'}
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.ajouterAuPanier = (id) => {
            const item = itemsData.find(i => i.id === id);
            const qtyToAdd = parseInt(document.getElementById(`qty-${id}`).value);
            const qteActuelle = panier.find(p => p.id === id)?.qty || 0;
            
            if (qteActuelle + qtyToAdd > item.stock) return alert("Stock insuffisant");

            const index = panier.findIndex(p => p.id === id);
            if (index > -1) panier[index].qty += qtyToAdd;
            else panier.push({ ...item, qty: qtyToAdd });
            
            renderInventory();
            majContratVisuel();
        }

        window.retirer = (id) => {
            panier = panier.filter(p => p.id !== id);
            renderInventory();
            majContratVisuel();
        }

        function majContratVisuel() {
            let tp = 0; let tc = 0;
            const info = {
                nom: document.getElementById('nom_loueur').value || "________________",
                mail: document.getElementById('email_loueur').value || "________________",
                tel: document.getElementById('tel_loueur').value || "________________",
                dep: document.getElementById('date_debut').value || "____/____/____",
                ret: document.getElementById('date_fin').value || "____/____/____"
            };

            const list = document.getElementById('panierList');
            list.innerHTML = panier.length === 0 ? "Vide" : panier.map(item => {
                tp += (item.qty * item.prix);
                tc += (item.qty * (item.caution_unitaire || 0));
                return `<div class="flex justify-between text-gray-700"><span>${item.qty}x ${item.nom}</span> <button onclick="retirer(${item.id})" class="text-red-500 text-xs">Retirer</button></div>`;
            }).join('');

            document.getElementById('totalPrix').innerText = tp.toFixed(2) + " €";
            document.getElementById('totalCaution').innerText = tc.toFixed(2) + " €";

            const rows = panier.map(a => `<tr><td style="border: 1px solid black; padding: 6px;">${a.nom}</td><td style="border: 1px solid black; padding: 6px; text-align:center;">${a.qty}</td><td style="border: 1px solid black; padding: 6px; text-align:center;">${(a.qty * a.prix).toFixed(2)} €</td></tr>`).join('');

            document.getElementById('pdf-render-zone').innerHTML = `
                <div style="text-align: center; border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="margin:0; font-size: 18px;">CONTRAT DE LOCATION - ECOLE SAINTE ANNE CASSON</h2>
                    <p style="font-size: 11px; margin: 4px 0;">OGEC SERVICE LOCATION | 2 Rue du château | 44390 CASSON</p>
                </div>
                <p style="font-size: 12px;"><strong>Loueur :</strong> ${info.nom} | <strong>Tél :</strong> ${info.tel}</p>
                <div style="margin: 10px 0; border: 1px solid black; padding: 8px; font-size: 12px;">
                    <strong>Dates :</strong> Du ${info.dep} au ${info.ret}
                </div>
                <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                    <tr style="background: #f5f5f5;">
                        <th style="border: 1px solid black; padding: 5px; text-align: left;">Article</th>
                        <th style="border: 1px solid black; padding: 5px;">Qté</th>
                        <th style="border: 1px solid black; padding: 5px;">Total</th>
                    </tr>
                    ${rows}
                </table>
                <p style="font-size: 13px; margin-top: 10px;"><strong>Total : ${tp.toFixed(2)} €</strong> | Caution : ${tc.toFixed(2)} €</p>
                <div style="font-size: 9px; margin-top: 15px; border: 1px solid black; padding: 5px; text-align: center;">
                    <strong>CE CONTRAT NE FAIT FOI QU'APRÈS CONFIRMATION PAR L'OGEC</strong>
                </div>
            `;
        }

        ['nom_loueur', 'email_loueur', 'tel_loueur', 'date_debut', 'date_fin'].forEach(id => {
            document.getElementById(id).addEventListener('input', majContratVisuel);
        });

        window.confirmerReservation = async () => {
            const btn = document.getElementById('btnSubmit');
            const info = {
                nom: document.getElementById('nom_loueur').value,
                email: document.getElementById('email_loueur').value
            };

            if (!info.nom || panier.length === 0) return alert("Veuillez remplir votre nom et votre panier.");

            btn.disabled = true;
            btn.innerText = "Envoi de la demande...";

            const contratHTML = document.getElementById('pdf-render-zone').innerHTML;

            try {
                await emailjs.send('service_63g35od', 'template_gb5d2wt', {
                    nom_loueur: info.nom,
                    email_destinataire: info.email,
                    message_html: contratHTML // Cette variable doit exister dans ton template EmailJS
                });

                alert("Demande envoyée ! Vous allez recevoir un e-mail de confirmation.");
                window.location.reload();
            } catch (e) {
                console.error(e);
                alert("Erreur lors de l'envoi.");
                btn.disabled = false;
            }
        };

        fetchMateriels();
    </script>
</body>
</html>
