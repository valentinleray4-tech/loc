<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loc'APE - Gestion des Locations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("nOykns8pFjxSLoS1s"); })();</script>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-indigo-700 text-white shadow-md p-6">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Loc'APEL école St Anne-Casson</h1>
                <p class="text-indigo-100 italic">Réservez, louez, aidez l'école !</p>
            </div>
            <div id="connectionStatus" class="text-xs bg-indigo-800 p-2 rounded text-indigo-200">
                <i class="fas fa-database mr-1"></i> Connexion...
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm min-h-[400px]">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Inventaire disponible</h2>
                <div class="grid md:grid-cols-2 gap-6" id="inventory">
                    <p class="text-gray-400">Chargement du matériel...</p>
                </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-indigo-500 sticky top-6">
                <h2 class="text-xl font-bold mb-4">Récapitulatif</h2>
                <div id="panierList" class="space-y-3 mb-6 max-h-60 overflow-y-auto border-b pb-4">
                    <p class="text-gray-400 italic text-center">Aucun article sélectionné</p>
                </div>

                <div class="space-y-2 mb-6">
                    <div class="flex justify-between text-gray-600">
                        <span>Total Location :</span>
                        <span id="totalPrix" class="font-bold">0.00 €</span>
                    </div>
                    <div class="flex justify-between text-orange-600 bg-orange-50 p-2 rounded">
                        <span class="text-sm">Caution à prévoir :</span>
                        <span id="totalCaution" class="font-bold">0.00 €</span>
                    </div>
                </div>

                <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-3 text-sm flex items-center">
                        <i class="fas fa-user-edit mr-2 text-indigo-500"></i> Informations
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" id="nom_loueur" placeholder="Nom et Prénom" class="p-2 border rounded text-sm w-full outline-none focus:ring-2 focus:ring-indigo-500">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="email" id="email_loueur" placeholder="Email" class="p-2 border rounded text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                            <input type="tel" id="tel_loueur" placeholder="Téléphone" class="p-2 border rounded text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Début</label>
                                <input type="date" id="date_debut" class="p-2 border rounded text-sm outline-none">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Fin</label>
                                <input type="date" id="date_fin" class="p-2 border rounded text-sm outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <button id="submitBtn" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 shadow-lg transition transform active:scale-95">
                    Confirmer la réservation
                </button>
            </div>
        </aside>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://uofkzlgqryxhjaovidqf.supabase.co' 
        const SUPABASE_KEY = 'sb_publishable_3yWGD_MoqP-6jHeHbbIM5w_kphGAJ2F'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        let panier = [];
        let itemsData = [];

        // Initialisation
        async function fetchMateriels() {
            try {
                const { data, error } = await supabase.from('materiels').select('*');
                if (error) throw error;
                itemsData = data;
                renderInventory();
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-check-circle text-green-400"></i> Connecté';
            } catch (err) {
                document.getElementById('connectionStatus').innerHTML = 'Erreur Database';
            }
        }

        function renderInventory() {
            const container = document.getElementById('inventory');
            container.innerHTML = itemsData.map(item => `
                <div class="border rounded-lg overflow-hidden flex flex-col bg-white shadow-sm">
                    <img src="${item.image_url || 'https://via.placeholder.com/150'}" class="h-32 w-full object-cover">
                    <div class="p-3 flex flex-col flex-grow">
                        <h3 class="font-bold text-sm text-gray-800">${item.nom}</h3>
                        <p class="text-indigo-600 font-bold text-sm">${item.prix.toFixed(2)} €</p>
                        <div class="mt-2 flex gap-2">
                            <input type="number" id="qty-${item.id}" value="1" min="1" class="w-10 border rounded text-center text-xs">
                            <button class="btn-add flex-1 bg-indigo-600 text-white text-[10px] py-1 rounded font-bold" data-id="${item.id}">Ajouter</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.onclick = () => ajouterAuPanier(parseInt(btn.dataset.id));
            });
        }

        function ajouterAuPanier(id) {
            const item = itemsData.find(i => i.id === id);
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const index = panier.findIndex(p => p.id === id);
            if (index > -1) panier[index].qty += qty;
            else panier.push({ ...item, qty });
            majPanier();
        }

        function majPanier() {
            const container = document.getElementById('panierList');
            let totalP = 0; let totalC = 0;
            if (panier.length === 0) {
                container.innerHTML = '<p class="text-gray-400 italic text-center">Vide</p>';
            } else {
                container.innerHTML = panier.map((item, index) => {
                    totalP += (item.qty * item.prix);
                    totalC += (item.qty * (item.caution_unitaire || 10)); 
                    return `<div class="flex justify-between items-center text-xs bg-gray-50 p-2 rounded">
                        <span>${item.qty}x ${item.nom}</span>
                        <button class="btn-del text-red-500" data-index="${index}"><i class="fas fa-times"></i></button>
                    </div>`;
                }).join('');
            }
            document.querySelectorAll('.btn-del').forEach(btn => {
                btn.onclick = () => { panier.splice(parseInt(btn.dataset.index), 1); majPanier(); };
            });
            document.getElementById('totalPrix').innerText = totalP.toFixed(2) + " €";
            document.getElementById('totalCaution').innerText = totalC.toFixed(2) + " €";
        }

        // --- GÉNÉRATION PDF & ENVOI ---
        async function confirmerReservation() {
            const btn = document.getElementById('submitBtn');
            const data = {
                nom: document.getElementById('nom_loueur').value,
                email: document.getElementById('email_loueur').value,
                tel: document.getElementById('tel_loueur').value,
                debut: document.getElementById('date_debut').value,
                fin: document.getElementById('date_fin').value
            };

            if (!data.nom || !data.email || panier.length === 0) {
                alert("Veuillez remplir le nom, l'email et ajouter des articles.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Génération du contrat...";

            // 1. Création de la zone de rendu (FORCÉE VISIBLE MAIS CACHÉE)
            const renderZone = document.createElement('div');
            renderZone.style.cssText = "position: fixed; top: 0; left: 0; width: 210mm; background: white; z-index: -1000; padding: 40px; color: black;";
            renderZone.innerHTML = `
                <div style="font-family: Arial, sans-serif; line-height: 1.6;">
                    <h1 style="text-align: center; color: #3730a3; border-bottom: 2px solid #3730a3;">CONTRAT DE LOCATION</h1>
                    <p style="text-align: center;">Ecole Sainte Anne - Casson</p>
                    <div style="margin: 30px 0; display: flex; justify-content: space-between;">
                        <div><strong>Loueur:</strong> ${data.nom}<br><strong>Tél:</strong> ${data.tel}</div>
                        <div style="text-align: right;"><strong>Dates:</strong> du ${data.debut} au ${data.fin}</div>
                    </div>
                    <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                        <thead>
                            <tr style="background: #f3f4f6;">
                                <th style="border: 1px solid #ddd; padding: 8px; text-align: left;">Article</th>
                                <th style="border: 1px solid #ddd; padding: 8px; text-align: center;">Qté</th>
                                <th style="border: 1px solid #ddd; padding: 8px; text-align: right;">Total</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${panier.map(a => `
                                <tr>
                                    <td style="border: 1px solid #ddd; padding: 8px;">${a.nom}</td>
                                    <td style="border: 1px solid #ddd; padding: 8px; text-align: center;">${a.qty}</td>
                                    <td style="border: 1px solid #ddd; padding: 8px; text-align: right;">${(a.qty * a.prix).toFixed(2)} €</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top: 30px; text-align: right;">
                        <p style="font-size: 18px;"><strong>Total Location: ${document.getElementById('totalPrix').innerText}</strong></p>
                        <p style="color: #ea580c;">Caution à déposer: ${document.getElementById('totalCaution').innerText}</p>
                    </div>
                </div>
            `;
            document.body.appendChild(renderZone);

            // 2. Attente forcée pour le rendu
            await new Promise(r => setTimeout(r, 1000));

            const opt = {
                margin: 10,
                filename: `Contrat_${data.nom}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: "#ffffff" },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                const pdfWorker = html2pdf().set(opt).from(renderZone);
                await pdfWorker.save(); // Téléchargement utilisateur
                const pdfBlob = await pdfWorker.output('blob');
                document.body.removeChild(renderZone);

                // 3. Envoi Supabase & Email
                btn.innerText = "Finalisation...";
                const fileName = `${Date.now()}_contrat.pdf`;
                
                const { error: uploadError } = await supabase.storage.from('contrats').upload(fileName, pdfBlob);
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = supabase.storage.from('contrats').getPublicUrl(fileName);

                await emailjs.send('service_63g35od', 'template_gb5d2wt', {
                    nom_loueur: data.nom,
                    email_destinataire: data.email,
                    lien_pdf: publicUrl
                });

                alert("Réservation réussie ! Le contrat a été téléchargé et envoyé par email.");
                window.location.reload();

            } catch (err) {
                console.error(err);
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "Réessayer";
            }
        }

        document.getElementById('submitBtn').onclick = confirmerReservation;
        fetchMateriels();
    </script>
</body>
</html>
