<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loc'APE - Gestion des Locations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">(function(){ emailjs.init("nOykns8pFjxSLoS1s"); })();</script>
</head>
<body class="bg-gray-100 min-h-screen">

    <header class="bg-indigo-700 text-white shadow-md p-6">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Loc'APEL école St Anne-Casson</h1>
                <p class="text-indigo-100 italic">Réservez, louez, aidez l'école !</p>
            </div>
            <div id="connectionStatus" class="text-xs bg-indigo-800 p-2 rounded text-indigo-200">
                <i class="fas fa-database mr-1"></i> Connexion base de données...
            </div>
        </div>
    </header>

    <main class="container mx-auto py-8 px-4 grid lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm min-h-[400px]">
                <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Inventaire disponible</h2>
                <div class="grid md:grid-cols-2 gap-6" id="inventory">
                    <p class="text-gray-400">Chargement du matériel...</p>
                </div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-indigo-500 sticky top-6">
                <h2 class="text-xl font-bold mb-4">Récapitulatif</h2>
                
                <div id="panierList" class="space-y-3 mb-6 max-h-60 overflow-y-auto border-b pb-4">
                    <p class="text-gray-400 italic text-center">Aucun article sélectionné</p>
                </div>

                <div class="space-y-2 mb-6">
                    <div class="flex justify-between text-gray-600">
                        <span>Total Location :</span>
                        <span id="totalPrix" class="font-bold">0.00 €</span>
                    </div>
                    <div class="flex justify-between text-orange-600 bg-orange-50 p-2 rounded">
                        <span class="text-sm">Caution à prévoir :</span>
                        <span id="totalCaution" class="font-bold">0.00 €</span>
                    </div>
                </div>

                <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-gray-700 mb-3 text-sm flex items-center">
                        <i class="fas fa-user-edit mr-2 text-indigo-500"></i> Informations de location
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" id="nom_loueur" placeholder="Nom et Prénom du loueur" class="p-2 border rounded text-sm w-full focus:ring-2 focus:ring-indigo-500 outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <input type="email" id="email_loueur" placeholder="Adresse email" class="p-2 border rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            <input type="tel" id="tel_loueur" placeholder="Téléphone" class="p-2 border rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Début</label>
                                <input type="date" id="date_debut" class="p-2 border rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div class="flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Fin</label>
                                <input type="date" id="date_fin" class="p-2 border rounded text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <button id="submitBtn" class="w-full mt-6 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 shadow-lg transition transform active:scale-95">
                    Confirmer la réservation
                </button>
            </div>
        </aside>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://uofkzlgqryxhjaovidqf.supabase.co' 
        const SUPABASE_KEY = 'sb_publishable_3yWGD_MoqP-6jHeHbbIM5w_kphGAJ2F'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        let panier = [];
        let itemsData = [];

        async function fetchMateriels() {
            try {
                const { data, error } = await supabase.from('materiels').select('*');
                if (error) throw error;
                itemsData = data;
                renderInventory();
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-check-circle text-green-400"></i> Connecté à Supabase';
            } catch (err) {
                console.error(err);
                document.getElementById('connectionStatus').innerHTML = '<i class="fas fa-exclamation-triangle text-red-400"></i> Erreur de connexion';
            }
        }

        function renderInventory() {
            const container = document.getElementById('inventory');
            container.innerHTML = itemsData.map(item => `
                <div class="border rounded-lg overflow-hidden flex flex-col bg-white shadow-sm">
                    <div class="h-40 bg-gray-100 relative">
                        <img src="${item.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        <span class="absolute top-2 right-2 bg-green-500 text-white text-[10px] px-2 py-1 rounded font-bold uppercase">
                            Stock : ${item.stock_total}
                        </span>
                    </div>
                    <div class="p-4 flex flex-col justify-between flex-grow">
                        <div>
                            <h3 class="font-bold text-gray-800">${item.nom}</h3>
                            <p class="text-xs text-gray-500 mb-2">${item.description || ''}</p>
                            <p class="text-indigo-600 font-bold">${item.prix.toFixed(2)} €</p>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <input type="number" id="qty-${item.id}" min="1" max="${item.stock_total}" value="1" class="w-12 border rounded text-center text-sm border-indigo-100">
                            <button data-id="${item.id}" class="btn-ajouter flex-1 bg-indigo-600 text-white text-xs py-2 rounded font-bold">Ajouter</button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Delegation d'evenement pour les boutons ajouter
            document.querySelectorAll('.btn-ajouter').forEach(btn => {
                btn.onclick = () => ajouterAuPanier(parseInt(btn.dataset.id));
            });
        }

        function ajouterAuPanier(id) {
            const item = itemsData.find(i => i.id === id);
            const qtyInput = document.getElementById(`qty-${id}`);
            const qtySouhaitee = parseInt(qtyInput.value);
            const index = panier.findIndex(p => p.id === id);
            const qtyDejaDansPanier = index > -1 ? panier[index].qty : 0;
            const totalApresAjout = qtyDejaDansPanier + qtySouhaitee;

            if (totalApresAjout > item.stock_total) {
                alert("Stock insuffisant.");
                return;
            }

            if (index > -1) panier[index].qty = totalApresAjout;
            else panier.push({ ...item, qty: qtySouhaitee });
            
            majPanier();
        }

        function majPanier() {
            const container = document.getElementById('panierList');
            let totalP = 0; let totalC = 0;
            if (panier.length === 0) {
                container.innerHTML = '<p class="text-gray-400 italic text-center py-4">Le panier est vide</p>';
            } else {
                container.innerHTML = panier.map((item, index) => {
                    totalP += (item.qty * item.prix);
                    totalC += (item.qty * (item.caution_unitaire || 10)); 
                    return `<div class="flex justify-between items-center text-xs bg-gray-50 p-2 rounded border border-gray-100">
                        <span>${item.qty}x ${item.nom}</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold">${(item.qty * item.prix).toFixed(2)}€</span>
                            <button class="btn-suppr text-red-400" data-index="${index}"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`;
                }).join('');
                
                document.querySelectorAll('.btn-suppr').forEach(btn => {
                    btn.onclick = () => {
                        panier.splice(parseInt(btn.dataset.index), 1);
                        majPanier();
                    };
                });
            }
            document.getElementById('totalPrix').innerText = totalP.toFixed(2) + " €";
            document.getElementById('totalCaution').innerText = totalC.toFixed(2) + " €";
        }

        async function confirmerReservation() {
            const nom = document.getElementById('nom_loueur').value;
            const email = document.getElementById('email_loueur').value;
            const tel = document.getElementById('tel_loueur').value;
            const debut = document.getElementById('date_debut').value;
            const fin = document.getElementById('date_fin').value;
            const totalP = document.getElementById('totalPrix').innerText;
            const totalC = document.getElementById('totalCaution').innerText;
            const btn = document.getElementById('submitBtn');

            if (!nom || !email || !debut || !fin || panier.length === 0) {
                alert("Informations manquantes.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Génération du contrat...";

            // Zone de rendu PDF (invisible mais présente)
            const container = document.createElement('div');
            container.style.cssText = "position:fixed; left:-5000px; top:0; width:800px; background:white; padding:40px; color:black;";
            container.innerHTML = `
                <div style="font-family: Arial, sans-serif; border: 1px solid #000; padding: 20px;">
                    <h1 style="text-align:center; text-decoration: underline;">CONTRAT DE LOCATION</h1>
                    <p style="text-align:center;">École Sainte Anne - Casson</p>
                    <div style="margin: 40px 0; display: flex; justify-content: space-between;">
                        <div><strong>Loueur :</strong><br>${nom}<br>${tel}<br>${email}</div>
                        <div style="text-align:right;"><strong>Date :</strong> ${new Date().toLocaleDateString('fr-FR')}</div>
                    </div>
                    <p><strong>Période :</strong> du ${debut} au ${fin}</p>
                    <table style="width:100%; border-collapse:collapse; margin-top:20px;">
                        <thead>
                            <tr style="background:#eee; border:1px solid #000;">
                                <th style="border:1px solid #000; padding:10px;">Article</th>
                                <th style="border:1px solid #000; padding:10px;">Qté</th>
                                <th style="border:1px solid #000; padding:10px;">Prix</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${panier.map(a => `
                                <tr>
                                    <td style="border:1px solid #000; padding:8px;">${a.nom}</td>
                                    <td style="border:1px solid #000; padding:8px; text-align:center;">${a.qty}</td>
                                    <td style="border:1px solid #000; padding:8px; text-align:right;">${(a.qty * a.prix).toFixed(2)} €</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div style="margin-top:20px; text-align:right; font-size: 1.2em;">
                        <strong>TOTAL LOCATION : ${totalP}</strong><br>
                        <strong>CAUTION : ${totalC}</strong>
                    </div>
                </div>
            `;
            document.body.appendChild(container);

            // Options PDF pour éviter le blanc
            const opt = {
                margin: 10,
                filename: `Contrat_${nom}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            try {
                // Attente rendu
                await new Promise(r => setTimeout(r, 1000));
                
                // On génère et on sauvegarde
                const worker = html2pdf().set(opt).from(container);
                await worker.save();
                
                // On récupère le blob pour l'envoi
                const pdfBlob = await worker.output('blob');
                document.body.removeChild(container);

                btn.innerText = "Envoi aux serveurs...";

                // 1. Database
                const { error: dbErr } = await supabase.from('reservations').insert([{
                    nom_loueur: nom, email: email, telephone: tel,
                    date_debut: debut, date_fin: fin, articles: panier,
                    total_prix: parseFloat(totalP), total_caution: parseFloat(totalC)
                }]);
                if (dbErr) throw dbErr;

                // 2. Storage
                const fileName = `${Date.now()}_contrat.pdf`;
                const { error: stErr } = await supabase.storage.from('contrats').upload(fileName, pdfBlob);
                if (stErr) throw stErr;

                // 3. Email
                const { data: { publicUrl } } = supabase.storage.from('contrats').getPublicUrl(fileName);
                await emailjs.send('service_63g35od', 'template_gb5d2wt', {
                    nom_loueur: nom,
                    email_destinataire: email,
                    lien_pdf: publicUrl
                });

                alert("Réservation réussie !");
                window.location.reload();

            } catch (err) {
                console.error(err);
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "Confirmer la réservation";
            }
        }

        // Liaison finale du bouton
        document.getElementById('submitBtn').addEventListener('click', confirmerReservation);
        
        // Init
        fetchMateriels();
    </script>
</body>
</html>
